apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openvpn-manager.fullname" . }}-config
  labels:
    {{- include "openvpn-manager.labels" . | nindent 4 }}
data:
  {{- $idx := 0 }}
  {{- range $key, $server := .Values.vpnServers }}
  {{- $idx = add $idx 1 }}
  VPN_SERVER_{{ $idx }}_NAME: {{ $server.name | quote }}
  VPN_SERVER_{{ $idx }}_HOST: {{ $server.host | quote }}
  VPN_SERVER_{{ $idx }}_USER: {{ $server.user | quote }}
  VPN_SERVER_{{ $idx }}_KEY_PATH: {{ $server.keyPath | quote }}
  VPN_SERVER_{{ $idx }}_SCRIPT_PATH: {{ $server.scriptPath | quote }}
  VPN_SERVER_{{ $idx }}_OVPN_DIR: {{ $server.ovpnDir | quote }}
  VPN_SERVER_{{ $idx }}_ENV_LABEL: {{ $server.envLabel | quote }}
  VPN_SERVER_{{ $idx }}_MENU_ADD: {{ $server.menuAdd | default "1" | quote }}
  VPN_SERVER_{{ $idx }}_MENU_REVOKE: {{ $server.menuRevoke | default "2" | quote }}
  {{- end }}
  API_HOST: "0.0.0.0"
  API_PORT: {{ .Values.backend.port | quote }}
  CORS_ORIGINS: {{ .Values.corsOrigins | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.googleSso.clientId | default "" | quote }}
  ALLOWED_EMAIL_DOMAINS: {{ .Values.googleSso.allowedEmailDomains | default "" | quote }}

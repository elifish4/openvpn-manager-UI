apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "openvpn-manager.fullname" . }}-data
  labels:
    {{- include "openvpn-manager.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass | default "gp2" }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | default "1Gi" }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openvpn-manager.frontend.name" . }}
  labels:
    {{- include "openvpn-manager.labels" . | nindent 4 }}
    {{- include "openvpn-manager.frontend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openvpn-manager.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openvpn-manager.frontend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          env:
            - name: BACKEND_HOST
              value: {{ include "openvpn-manager.backend.name" . }}
            - name: BACKEND_PORT
              value: {{ .Values.backend.port | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}

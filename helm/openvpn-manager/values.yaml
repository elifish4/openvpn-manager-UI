replicaCount: 1

backend:
  image:
    repository: docker.io/kokofish/openvpn-manager-backend
    tag: "latest"
    pullPolicy: Always
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

frontend:
  image:
    repository: docker.io/kokofish/openvpn-manager-frontend
    tag: "latest"
    pullPolicy: Always
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: true
  className: internal-nginx
  host: vpn-manager.agorareal.com
  annotations: {}
  tls: []
  #  - secretName: vpn-manager-tls
  #    hosts:
  #      - vpn-manager.agorareal.com

# SSH private keys for connecting to VPN servers.
# Each key here becomes a file in /app/keys/<name>.pem mounted into the backend pod.
sshKeys: {}
#  devops-open-vpn-prod: |
#    -----BEGIN RSA PRIVATE KEY-----
#    ...
#    -----END RSA PRIVATE KEY-----
#  devops-open-vpn-stage: |
#    -----BEGIN RSA PRIVATE KEY-----
#    ...
#    -----END RSA PRIVATE KEY-----

# Alternatively, reference an existing secret that already contains the SSH keys.
# The secret should have data keys like "devops-open-vpn-prod.pem", "devops-open-vpn-stage.pem"
existingSshKeysSecret: "vpn-manager-openvpn-manager-ssh-keys"

# VPN server configuration — passed as env vars to the backend.
vpnServers:
  server1:
    name: "Production VPN"
    host: "18.184.120.11"
    user: "ubuntu"
    keyPath: "/app/keys/devops-open-vpn-prod.pem"
    scriptPath: "sudo bash openvpn.sh"
    ovpnDir: "/home/ubuntu"
    envLabel: "prod"
    menuAdd: "1"
    menuRevoke: "4"
  server2:
    name: "Dev VPN"
    host: "3.71.40.204"
    user: "ubuntu"
    keyPath: "/app/keys/devops-open-vpn-dev.pem"
    scriptPath: "sudo bash openvpn.sh"
    ovpnDir: "/home/ubuntu"
    envLabel: "dev"
    menuAdd: "1"
    menuRevoke: "4"
  server3:
    name: "Stage VPN"
    host: "3.64.251.242"
    user: "ubuntu"
    keyPath: "/app/keys/devops-open-vpn-stage.pem"
    scriptPath: "sudo bash openvpn.sh"
    ovpnDir: "/home/ubuntu"
    envLabel: "stage"
    menuAdd: "1"
    menuRevoke: "4"

corsOrigins: "*"

# Google SSO settings.
# Get a Web Application OAuth Client ID from
#   Google Cloud Console > APIs & Services > Credentials > Create Credentials > OAuth client ID
# Authorized JavaScript origins must include the URL the SPA is served from
# (e.g. https://vpn-manager.agorareal.com).
googleSso:
  # Required. Google OAuth Web Client ID (looks like "...apps.googleusercontent.com").
  # NOTE: only the Client ID is needed. We use Google Identity Services
  # (browser ID-token flow), so no Client Secret is required server-side.
  clientId: "177616890587-lp0dd8plu0a007lfebcjjpk27c69dj5f.apps.googleusercontent.com"
  # Optional comma-separated list of email domains allowed to sign in.
  # Empty = any Google account allowed. The first user to ever sign in becomes
  # admin automatically; everyone else starts as 'viewer'.
  allowedEmailDomains: "agorareal.com"

auth:
  # Used to sign session JWTs. Generate with: openssl rand -hex 32
  jwtSecret: "change-this-to-a-random-string"
  slackBotToken: ""

persistence:
  size: "1Gi"
  storageClass: "gp2"

imagePullSecrets: []

serviceAccount:
  create: false
  name: ""
